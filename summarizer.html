<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Summarizer — AI Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
  </style>
</head>
<body>
  <div class="page-wrap">
    <a href="index.html" class="back-link">← Back to Hub</a>

    <div class="page-title">📝 Text Summarizer</div>
    <p class="page-subtitle">Paste any article, essay, or document and get a clean summary.</p>

    <div class="field">
      <label for="inputText">Your text</label>
      <textarea id="inputText" rows="10" placeholder="Paste your text here…"></textarea>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; align-items:center;">
      <div class="field" style="margin:0; flex:1; min-width:180px;">
        <label for="summaryStyle">Summary style</label>
        <select id="summaryStyle">
          <option value="concise">Concise (3–5 sentences)</option>
          <option value="bullet">Bullet points</option>
          <option value="detailed">Detailed paragraph</option>
          <option value="eli5">Explain like I'm 5</option>
          <option value="executive">Executive summary</option>
        </select>
      </div>
      <button class="btn btn-blue" id="summarizeBtn" onclick="summarize()" style="margin-top:20px;">
        ✨ Summarize
      </button>
      <button class="btn btn-ghost" onclick="clearAll()" style="margin-top:20px;">Clear</button>
    </div>

    <label>Summary</label>
    <div class="output-box empty" id="output">Your summary will appear here…</div>

    <div style="margin-top:12px; display:flex; gap:8px;">
      <button class="btn btn-ghost" id="copyBtn" onclick="copyOutput()" disabled>📋 Copy</button>
    </div>
  </div>

  <script src="js/gemini.js"></script>
  <script>
    const outputEl  = document.getElementById('output');
    const copyBtn   = document.getElementById('copyBtn');
    const summarizeBtn = document.getElementById('summarizeBtn');

    const stylePrompts = {
      concise:   'Summarize the following text in 3 to 5 clear, concise sentences.',
      bullet:    'Summarize the following text as a list of bullet points covering the key ideas.',
      detailed:  'Write a detailed summary of the following text in one or two paragraphs.',
      eli5:      'Summarize the following text as if explaining it to a 5-year-old child.',
      executive: 'Write a professional executive summary of the following text, highlighting key findings and takeaways.'
    };

    async function summarize() {
      const text  = document.getElementById('inputText').value.trim();
      const style = document.getElementById('summaryStyle').value;

      if (!text) { alert('Please paste some text first.'); return; }

      summarizeBtn.disabled = true;
      summarizeBtn.innerHTML = '<span class="spinner"></span> Summarizing…';
      outputEl.className = 'output-box empty';
      outputEl.textContent = 'Generating summary…';
      copyBtn.disabled = true;

      try {
        const prompt = `${stylePrompts[style]}\n\n---\n${text}`;
        const result = await geminiAsk(prompt);
        outputEl.className = 'output-box';
        outputEl.textContent = result;
        copyBtn.disabled = false;
      } catch (err) {
        outputEl.className = 'output-box';
        outputEl.textContent = '⚠️ Error: ' + err.message;
      } finally {
        summarizeBtn.disabled = false;
        summarizeBtn.innerHTML = '✨ Summarize';
      }
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      outputEl.className = 'output-box empty';
      outputEl.textContent = 'Your summary will appear here…';
      copyBtn.disabled = true;
    }

    function copyOutput() {
      navigator.clipboard.writeText(outputEl.textContent).then(() => alert('Copied!'));
    }
  </script>
</body>
</html>
