<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Text Summarizer</title>
    <!-- Linking to stylings based on project structure -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-alt"></i> Text Summarizer</h1>
            <p>Paste long text below to get a concise, AI-powered summary.</p>
        </header>

        <main class="tool-container">
            <div class="input-group">
                <textarea id="textInput" placeholder="Enter or paste your text here..." rows="12"></textarea>
            </div>
            
            <div class="actions">
                <button id="summarizeBtn" class="primary-btn">
                    <i class="fas fa-magic"></i> Summarize
                </button>
            </div>

            <div id="resultArea" class="result-area" style="display: none;">
                <h3>Summary</h3>
                <div id="summaryOutput" class="summary-box"></div>
                <button class="copy-btn" onclick="copySummary()">
                    <i class="fas fa-copy"></i> Copy Summary
                </button>
            </div>
        </main>

        <footer>
            <a href="index.html" class="back-link">← Back to Hub</a>
        </footer>
    </div>

    <!-- Linking to current script paths -->
    <script src="js/gemini.js"></script>
    <script src="js/summarize.js"></script>
    <script>
        function copySummary() {
            const text = document.getElementById('summaryOutput').innerText;
            navigator.clipboard.writeText(text).then(() => alert('Summary copied!'));
        }
    </script>
</body>
</html>
